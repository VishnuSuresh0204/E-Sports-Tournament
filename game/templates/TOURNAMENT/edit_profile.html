{% extends 'TOURNAMENT/commen.html' %}
{% load static %}

{% block content %}

<section class="section_padding py-5 user-page" style="margin-top: 100px;">

    <div class="container mb-5 text-center">
        <h2 class="gaming-title" style="color: #fff; font-weight: 800; text-transform: uppercase;">
            <i class="fas fa-user-edit text-warning mr-2"></i>
            Update Credentials
        </h2>
        <p class="text-muted">
            Maintain your professional constructor profile
        </p>
    </div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">

                <div class="card gaming-card overflow-hidden"
                    style="background: #0b0f17; border-radius: 20px; border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 0 30px rgba(255, 193, 7, 0.15);">
                    <div class="card-header bg-dark p-4 d-flex align-items-center">
                        <div class="avatar-circle mr-3"
                            style="width: 60px; height: 60px; display: flex; align-items: center; justify-content: center;">
                            <i class="fas fa-user-cog text-warning fa-2x"></i>
                        </div>
                        <div>
                            <h4 class="text-white mb-0 fw-bold">Edit Profile</h4>
                            <small class="text-warning text-uppercase" style="letter-spacing: 1px;">
                                Constructor Maintenance
                            </small>
                        </div>
                    </div>

                    <div class="card-body p-4 p-md-5">

                        {% for m in messages %}
                        <div class="alert alert-{{ m.tags }} alert-dismissible fade show" role="alert">
                            {{ m }}
                            <button type="button" class="close" data-dismiss="alert">
                                <span>&times;</span>
                            </button>
                        </div>
                        {% endfor %}

                        <form action="/tc_profile/edit/" method="POST" enctype="multipart/form-data"
                            class="contact_form">
                            {% csrf_token %}

                            <div class="row">

                                <div class="col-md-6 mb-4">
                                    <label class="text-muted small text-uppercase fw-bold">
                                        <i class="fas fa-user mr-2"></i> Full Name
                                    </label>
                                    <input type="text" name="name" class="form-control form_input_dark"
                                        value="{{ profile.name }}" required>
                                </div>

                                <div class="col-md-6 mb-4">
                                    <label class="text-muted small text-uppercase fw-bold">
                                        <i class="fas fa-envelope mr-2"></i> Email Address
                                    </label>
                                    <input type="text" class="form-control" value="{{ profile.email }}" readonly
                                        disabled>
                                </div>

                                <div class="col-md-6 mb-4">
                                    <label class="text-muted small text-uppercase fw-bold">
                                        <i class="fas fa-phone mr-2"></i> Phone Contact
                                    </label>
                                    <input type="text" name="phone" class="form-control form_input_dark"
                                        value="{{ profile.phone }}" required>
                                </div>

                                <div class="col-md-6 mb-4">
                                    <label class="text-muted small text-uppercase fw-bold">
                                        <i class="fas fa-camera mr-2"></i> Profile Picture
                                    </label>
                                    <input type="file" name="profile_pic" class="form-control form_input_dark">
                                </div>

                            </div>

                            <hr class="my-4" style="border-top: 1px solid rgba(255,255,255,0.1);">

                            <div class="d-flex justify-content-center">
                                <button type="submit" class="btn_1 px-5 py-2 mr-3">
                                    <i class="fas fa-save mr-2"></i> Save Changes
                                </button>

                                <a href="/tc_profile/" class="btn btn-outline-warning px-5 py-2 text-warning">
                                    <i class="fas fa-times mr-2"></i> Cancel
                                </a>
                            </div>

                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>

</section>

</section>

{% endblock %}

{% endblock %}
