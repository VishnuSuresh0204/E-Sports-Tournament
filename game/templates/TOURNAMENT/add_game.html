{% extends 'TOURNAMENT/commen.html' %}
{% load static %}

{% for m in messages %}
<script>
  alert("{{ m|escapejs }}");
</script>
{% endfor %}

{% block content %}

<section class="section_padding">
  <div class="container">

    <!-- Page Title -->
    <div class="row mb-5">
      <div class="col-12 text-center">
        <h2 class="gaming-title" style="font-size: 3rem; margin-bottom: 0.5rem;">Add Game</h2>
        <p class="text-info text-uppercase fw-bold" style="letter-spacing: 4px; font-size: 0.8rem;">
          Expand your arena's roster
        </p>
      </div>
    </div>

    <!-- Add Game Form -->
    <div class="row justify-content-center">
      <div class="col-lg-8">

        <div class="card glass-panel neon-border-azure p-4 p-md-5">

          <form action="/add_game/" method="post" id="addGameForm" novalidate>
            {% csrf_token %}

            <div class="row">

              <!-- Game Name -->
              <div class="col-md-8 mb-4">
                <label class="form-label text-white small text-uppercase">Game Title</label>
                <div class="input-icon-wrapper">
                  <input class="form-control gaming-input" name="name" type="text" placeholder="e.g. Valorant, Dota 2"
                    required>
                  <i class="fas fa-gamepad"></i>
                </div>
              </div>

              <!-- Team Size -->
              <div class="col-md-4 mb-4">
                <label class="form-label text-white small text-uppercase">Team Size</label>
                <div class="input-icon-wrapper">
                  <input class="form-control gaming-input" name="team_size" type="number" min="1" placeholder="5">
                  <i class="fas fa-users"></i>
                </div>
              </div>

              <!-- Description -->
              <div class="col-12 mb-5">
                <label class="form-label text-white small text-uppercase">Game Meta / Description</label>
                <div class="input-icon-wrapper">
                  <textarea class="form-control gaming-input" name="description" rows="4"
                    placeholder="Briefly describe the game and its competitive nature..."></textarea>
                  <i class="fas fa-info-circle" style="top: 25px;"></i>
                </div>
              </div>

            </div>

            <!-- Buttons -->
            <div class="d-flex flex-column flex-md-row justify-content-center mt-2 gap-4">
              <button type="submit" class="gaming-btn-premium px-5 py-3">
                <i class="fas fa-plus-circle mr-2"></i> Register Game
              </button>

              <a href="/tc_view_game/" class="btn btn-outline-info rounded-0 d-flex align-items-center px-5"
                style="border-width: 2px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;">
                Back to Roster
              </a>
            </div>

          </form>

        </div>

      </div>
    </div>

  </div>
</section>

</section>

{% endblock %}
