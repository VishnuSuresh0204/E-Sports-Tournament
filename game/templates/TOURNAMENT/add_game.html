{% extends 'TOURNAMENT/commen.html' %}
{% load static %}

{% for m in messages %}
<script>
  alert("{{ m|escapejs }}");
</script>
{% endfor %}

{% block content %}

<section class="section_padding">
  <div class="container">

    <!-- Page Title -->
    <div class="row mb-5">
      <div class="col-12 text-center">
        <h2 class="gaming-title">Add Game</h2>
        <p class="text-muted">
          Add a new game to manage teams and tournaments
        </p>
      </div>
    </div>

    <!-- Add Game Form -->
    <div class="row justify-content-center">
      <div class="col-lg-8">

        <div class="card gaming-card p-4 p-md-5">

          <form class="form-contact contact_form" action="/add_game/" method="post" id="addGameForm" novalidate>

            {% csrf_token %}

            <div class="row">

              <!-- Game Name -->
              <div class="col-md-6 mb-4">
                <label class="form-label text-white">Game Name</label>
                <input class="form-control gaming-input" name="name" type="text" placeholder="Enter game name" required>
              </div>

              <!-- Team Size -->
              <div class="col-md-6 mb-4">
                <label class="form-label text-white">Team Size</label>
                <input class="form-control gaming-input" name="team_size" type="number" min="1" placeholder="Default 5">
              </div>

              <!-- Description -->
              <div class="col-12 mb-4">
                <label class="form-label text-white">Description</label>
                <textarea class="form-control gaming-input" name="description" rows="4"
                  placeholder="Enter game description"></textarea>
              </div>

            </div>

            <!-- Buttons -->
            <div class="d-flex flex-column flex-md-row justify-content-between mt-4 gap-3">
              <button type="submit" class="btn gaming-btn flex-fill">
                Add Game
              </button>

              <a href="/tc_view_game/" class="btn gaming-btn-secondary flex-fill text-center">
                Back to Game List
              </a>
            </div>

          </form>

        </div>

      </div>
    </div>

  </div>
</section>

<!-- PAGE-SPECIFIC GAMING STYLES -->
<style>
  .gaming-title {
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-shadow: 0 0 15px rgba(0, 255, 255, 0.6);
  }

  .gaming-card {
    background: #0b0f17;
    border-radius: 20px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    box-shadow: 0 0 30px rgba(0, 255, 255, 0.15);
  }

  .gaming-input {
    background: #05070c;
    border: 1px solid rgba(255, 255, 255, 0.15);
    color: #fff;
  }

  .gaming-input::placeholder {
    color: rgba(255, 255, 255, 0.4);
  }

  .gaming-input:focus {
    background: #05070c;
    color: #fff;
    border-color: #00ffff;
    box-shadow: 0 0 10px rgba(0, 255, 255, 0.4);
  }

  .gaming-btn {
    background: linear-gradient(135deg, #00c6ff, #0072ff);
    border: none;
    border-radius: 30px;
    padding: 12px 30px;
    font-weight: 700;
    text-transform: uppercase;
    color: #fff;
  }

  .gaming-btn:hover {
    box-shadow: 0 0 20px rgba(0, 255, 255, 0.6);
    transform: translateY(-2px);
  }

  .gaming-btn-secondary {
    background: transparent;
    border: 1px solid #00ffff;
    border-radius: 30px;
    padding: 12px 30px;
    font-weight: 700;
    text-transform: uppercase;
    color: #00ffff;
  }

  .gaming-btn-secondary:hover {
    background: #00ffff;
    color: #000;
  }
</style>

{% endblock %}
