{% extends 'USER/commen.html' %}
{% load static %}

{% block content %}

<section class="section_padding py-5 user-page">

    <div class="container mb-5 text-center">
        <h2 class="gaming-title">
            <i class="fas fa-credit-card text-warning mr-2"></i>
            Tournament Payment
        </h2>
        <p class="text-muted">
            Finalize your entry for <strong>{{ reg.tournament.name }}</strong>
        </p>
    </div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6">

                <div class="card gaming-card overflow-hidden">
                    <div class="card-header bg-dark p-4 text-center">
                        <h5 class="text-info mb-0 fw-bold">Registration Fee: ₹{{ reg.tournament.entry_fee }}</h5>
                    </div>

                    <div class="card-body p-4 p-md-5">
                        <form action="/tournament_payment/?reg_id={{ reg.id }}" method="POST">
                            {% csrf_token %}

                            <div class="mb-4">
                                <label class="text-muted small text-uppercase fw-bold">Cardholder Name</label>
                                <input type="text" class="form-control form_input_dark" placeholder="Gamer Name"
                                    required>
                            </div>

                            <div class="mb-4">
                                <label class="text-muted small text-uppercase fw-bold">Card Number</label>
                                <div class="input-group">
                                    <div class="input-group-prepend">
                                        <span class="input-group-text bg-black border-secondary text-muted">
                                            <i class="fas fa-credit-card"></i>
                                        </span>
                                    </div>
                                    <input type="text" name="card_number" class="form-control form_input_dark"
                                        maxlength="16" placeholder="XXXX XXXX XXXX XXXX" required>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-4">
                                    <label class="text-muted small text-uppercase fw-bold">Expiry Date</label>
                                    <input type="text" class="form-control form_input_dark" placeholder="MM/YY"
                                        required>
                                </div>
                                <div class="col-md-6 mb-4">
                                    <label class="text-muted small text-uppercase fw-bold">CVV</label>
                                    <input type="password" class="form-control form_input_dark" maxlength="3"
                                        placeholder="***" required>
                                </div>
                            </div>

                            <div class="alert alert-info py-2"
                                style="background: rgba(23, 162, 184, 0.1); border: 1px solid rgba(23, 162, 184, 0.2);">
                                <small class="text-info">
                                    <i class="fas fa-shield-alt mr-1"></i>
                                    Secure Mock Payment Gateway
                                </small>
                            </div>

                            <button type="submit" class="btn_1 btn-block py-3 mt-4">
                                Pay ₹{{ reg.tournament.entry_fee }} & Complete Entry
                            </button>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>

</section>

<style>
    .user-page {
        margin-top: 130px;
    }

    @media (max-width: 768px) {
        .user-page {
            margin-top: 160px;
        }
    }

    .gaming-title {
        font-weight: 800;
        letter-spacing: 2px;
        text-transform: uppercase;
        text-shadow: 0 0 12px rgba(23, 162, 184, 0.6);
    }

    .gaming-card {
        background: #0b0f17;
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 0 30px rgba(23, 162, 184, 0.15);
    }

    .form_input_dark {
        background-color: #000 !important;
        border: 1px solid #333 !important;
        color: #fff !important;
        border-radius: 10px;
        padding: 12px 15px;
    }

    .form_input_dark:focus {
        border-color: #17a2b8 !important;
        box-shadow: 0 0 10px rgba(23, 162, 184, 0.3) !important;
    }
</style>

{% endblock %}
