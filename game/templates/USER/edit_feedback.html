{% extends 'USER/commen.html' %}
{% load static %}

{% block content %}

<section class="section_padding py-5 user-page">
    <div class="container mb-5">
        <h2 class="gaming-title text-center">
            <i class="fas fa-edit text-info mr-2"></i>
            Edit Feedback
        </h2>
        <p class="text-muted text-center mb-0">Modify your tournament review</p>
    </div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="card gaming-card p-4">
                    <form action="/edit_feedback/" method="post">
                        {% csrf_token %}
                        <input type="hidden" name="feedback_id" value="{{ feedback.id }}">

                        <div class="form-group mb-4">
                            <label class="text-white small text-uppercase fw-bold">Tournament</label>
                            <input type="text" class="form-control gaming-input" value="{{ feedback.tournament.name }}"
                                readonly disabled>
                        </div>

                        <div class="form-group mb-4">
                            <label class="text-white small text-uppercase fw-bold">Rating (1-5)</label>
                            <select name="rating" class="form-control gaming-input" required>
                                <option value="1" {% if feedback.rating==1 %}selected{% endif %}>1 - Poor</option>
                                <option value="2" {% if feedback.rating==2 %}selected{% endif %}>2 - Fair</option>
                                <option value="3" {% if feedback.rating==3 %}selected{% endif %}>3 - Good</option>
                                <option value="4" {% if feedback.rating==4 %}selected{% endif %}>4 - Very Good</option>
                                <option value="5" {% if feedback.rating==5 %}selected{% endif %}>5 - Excellent</option>
                            </select>
                        </div>

                        <div class="form-group mb-4">
                            <label class="text-white small text-uppercase fw-bold">Subject</label>
                            <input type="text" name="subject" class="form-control gaming-input"
                                value="{{ feedback.subject }}" required minlength="5">
                        </div>

                        <div class="form-group mb-4">
                            <label class="text-white small text-uppercase fw-bold">Detailed Message</label>
                            <textarea name="message" class="form-control gaming-input" rows="5"
                                required>{{ feedback.message }}</textarea>
                        </div>

                        <div class="text-center mt-4">
                            <button type="submit" class="gaming-btn-large">
                                <i class="fas fa-save mr-2"></i> Update Feedback
                            </button>
                            <div class="mt-3">
                                <a href="/view_feedback/" class="text-muted small">Cancel and go back</a>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>

<style>
    .user-page {
        margin-top: 130px;
    }

    @media (max-width: 768px) {
        .user-page {
            margin-top: 160px;
        }
    }

    .gaming-title {
        font-weight: 800;
        letter-spacing: 2px;
        text-transform: uppercase;
        text-shadow: 0 0 12px rgba(23, 162, 184, 0.6);
    }

    .gaming-card {
        background: #0b1219;
        border-radius: 18px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
    }

    .gaming-input {
        background: rgba(255, 255, 255, 0.03) !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        color: #fff !important;
        border-radius: 10px;
        padding: 12px 15px;
    }

    .gaming-input:focus {
        border-color: #17a2b8 !important;
        box-shadow: 0 0 0 0.2rem rgba(23, 162, 184, 0.25) !important;
    }

    .gaming-btn-large {
        background: linear-gradient(135deg, #17a2b8, #007bff);
        color: #fff;
        border: none;
        padding: 12px 40px;
        border-radius: 30px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: all 0.3s;
        width: 100%;
    }

    .gaming-btn-large:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 20px rgba(23, 162, 184, 0.4);
        color: #fff;
    }
</style>

{% endblock %}
