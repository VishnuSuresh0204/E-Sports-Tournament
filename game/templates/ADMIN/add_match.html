{% extends 'ADMIN/commen.html' %}
{% load static %}

{% for m in messages %}
<script>alert("{{ m|escapejs }}");</script>
{% endfor %}

{% block content %}

<section class="section_padding">
  <div class="container">

    <!-- Page Title -->
    <div class="row mb-5">
      <div class="col-12 text-center">
        <h2 class="gaming-title">
          Add Match – {{ tournament.name }}
        </h2>
        <p class="text-muted">
          Schedule and manage tournament battles
        </p>
      </div>
    </div>

    <!-- Add Match Form -->
    <div class="row justify-content-center">
      <div class="col-lg-8">

        <div class="card gaming-card p-4 p-md-5">

          <form class="form-contact contact_form" action="/add_match/?tournament_id={{ tournament.id }}" method="post"
            novalidate="novalidate">

            {% csrf_token %}

            <div class="row">

              <!-- Team 1 -->
              <div class="col-md-6 mb-4">
                <label class="form-label text-white">Team 1</label>
                <select class="form-control gaming-input" name="team1" size="5" required>
                  <option value="">Select Team 1</option>
                  {% for t in teams %}
                  <option value="{{ t.id }}">{{ t.name }}</option>
                  {% endfor %}
                </select>
              </div>

              <!-- Team 2 -->
              <div class="col-md-6 mb-4">
                <label class="form-label text-white">Team 2</label>
                <select class="form-control gaming-input" name="team2" size="5" required>
                  <option value="">Select Team 2</option>
                  {% for t in teams %}
                  <option value="{{ t.id }}">{{ t.name }}</option>
                  {% endfor %}
                </select>
              </div>

              <!-- Round Name -->
              <div class="col-12 mb-4">
                <label class="form-label text-white">Round Name</label>
                <input class="form-control gaming-input" name="round_name" type="text"
                  placeholder="Quarter Final / Semi Final / Final" required>
              </div>

              <!-- Schedule -->
              <div class="col-12 mb-4">
                <label class="form-label text-white">Scheduled Date & Time</label>
                <input class="form-control gaming-input" name="scheduled_at" type="datetime-local" required>
              </div>

            </div>

            <!-- Buttons -->
            <div class="d-flex justify-content-between mt-4">
              <button type="submit" class="btn gaming-btn">
                Save Match
              </button>

              <a href="/view_matches/?tournament_id={{ tournament.id }}" class="btn gaming-btn-secondary">
                Back
              </a>
            </div>

          </form>

        </div>

      </div>
    </div>

  </div>
</section>

<!-- PAGE-SPECIFIC GAMING STYLES -->
<style>
  .gaming-title {
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-shadow: 0 0 15px rgba(0, 255, 255, 0.6);
  }

  .gaming-card {
    background: #0b0f17;
    border-radius: 20px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    box-shadow: 0 0 30px rgba(0, 255, 255, 0.15);
  }

  .gaming-input {
    background: #05070c;
    border: 1px solid rgba(255, 255, 255, 0.15);
    color: #fff;
  }

  .gaming-input:focus {
    background: #05070c;
    color: #fff;
    border-color: #00ffff;
    box-shadow: 0 0 10px rgba(0, 255, 255, 0.4);
  }

  select.gaming-input {
    height: auto;
  }

  .gaming-btn {
    background: linear-gradient(135deg, #00c6ff, #0072ff);
    border: none;
    border-radius: 30px;
    padding: 12px 35px;
    font-weight: 700;
    color: #fff;
    text-transform: uppercase;
  }

  .gaming-btn:hover {
    box-shadow: 0 0 20px rgba(0, 255, 255, 0.6);
    transform: translateY(-2px);
  }

  .gaming-btn-secondary {
    background: transparent;
    border: 1px solid #00ffff;
    border-radius: 30px;
    padding: 12px 35px;
    font-weight: 700;
    color: #00ffff;
    text-transform: uppercase;
  }

  .gaming-btn-secondary:hover {
    background: #00ffff;
    color: #000;
  }
</style>

{% endblock %}
