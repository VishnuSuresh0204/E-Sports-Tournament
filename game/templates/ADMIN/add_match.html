{% extends 'ADMIN/commen.html' %}
{% load static %}

{% for m in messages %}
<script>alert("{{ m|escapejs }}");</script>
{% endfor %}

{% block content %}

<section class="section_padding">
  <div class="container">

    <!-- Page Title -->
    <div class="row mb-5">
      <div class="col-12 text-center">
        <h2 class="gaming-title">
          Add Match – {{ tournament.name }}
        </h2>
        <p class="text-muted">
          Schedule and manage tournament battles
        </p>
      </div>
    </div>

    <!-- Add Match Form -->
    <div class="row justify-content-center">
      <div class="col-lg-8">

        <div class="card gaming-card p-4 p-md-5">

          <form class="form-contact contact_form" action="/add_match/?tournament_id={{ tournament.id }}" method="post"
            novalidate="novalidate">

            {% csrf_token %}

            <div class="row">

              <!-- Team 1 -->
              <div class="col-md-6 mb-4">
                <label class="form-label text-white">Team 1</label>
                <select class="form-control gaming-input" name="team1" required>
                  <option value="">Select Team 1</option>
                  {% for t in teams %}
                  <option value="{{ t.id }}">{{ t.name }}</option>
                  {% endfor %}
                </select>
              </div>

              <!-- Team 2 -->
              <div class="col-md-6 mb-4">
                <label class="form-label text-white">Team 2</label>
                <select class="form-control gaming-input" name="team2" required>
                  <option value="">Select Team 2</option>
                  {% for t in teams %}
                  <option value="{{ t.id }}">{{ t.name }}</option>
                  {% endfor %}
                </select>
              </div>

              <!-- Round Name -->
              <div class="col-12 mb-4">
                <label class="form-label text-white">Round Name</label>
                <input class="form-control gaming-input" name="round_name" type="text"
                  placeholder="Quarter Final / Semi Final / Final" required>
              </div>

              <!-- Schedule -->
              <div class="col-12 mb-4">
                <label class="form-label text-white">Scheduled Date & Time</label>
                <input class="form-control gaming-input" name="scheduled_at" type="datetime-local" required>
              </div>

            </div>

            <!-- Buttons -->
            <div class="d-flex justify-content-between mt-4">
              <button type="submit" class="btn gaming-btn">
                Save Match
              </button>

              <a href="/view_matches/?tournament_id={{ tournament.id }}" class="btn gaming-btn-secondary">
                Back
              </a>
            </div>

          </form>

        </div>

      </div>
    </div>

  </div>
</section>

</section>

{% endblock %}

{% endblock %}
